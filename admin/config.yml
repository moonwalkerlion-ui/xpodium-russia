backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "ru"

# Настройка показывать превью внутри админки
site_url: https://xpodium-russia.netlify.app
display_url: https://xpodium-russia.netlify.app
logo_url: https://xpodium-russia.netlify.app/images/placeholder.svg

collections:
  # ============================
  # ТОВАРЫ
  # ============================
  - name: "products"
    label: "Товары"
    label_singular: "Товар"
    folder: "content/products"
    extension: "json"
    format: "json"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: name_ru
    summary: "{{name_ru}} — {{price}} ₽"
    sortable_fields: ['name_ru', 'price', 'category']
    view_filters:
      - label: "Экипировка"
        field: category
        pattern: "gear"
      - label: "Одежда"
        field: category
        pattern: "apparel"
      - label: "Аксессуары"
        field: category
        pattern: "accessories"
      - label: "Оборудование"
        field: category
        pattern: "equipment"
    fields:
      - { label: "Название", name: "name_ru", widget: "string" }
      - { label: "Бренд", name: "brand", widget: "string", default: "XPODIUM" }
      - label: "Категория"
        name: "category"
        widget: "select"
        options:
          - { label: "Экипировка (накладки, пояса, бинты, скакалки, наколенники)", value: "gear" }
          - { label: "Одежда (мужская и женская)", value: "apparel" }
          - { label: "Аксессуары (рюкзаки, брелоки, носки, мелочи)", value: "accessories" }
          - { label: "Оборудование (медболы, сэндбеги, штанги)", value: "equipment" }
      - label: "Подкатегория (для фильтра внутри раздела)"
        name: "subcategory"
        widget: "select"
        required: false
        options:
          - { label: "— не выбрано —", value: "" }
          - { label: "Накладки", value: "grips" }
          - { label: "Наколенники и налокотники", value: "sleeves" }
          - { label: "Пояса", value: "belts" }
          - { label: "Скакалки", value: "jumpropes" }
          - { label: "Кистевые бинты", value: "wraps" }
          - { label: "Одежда мужская", value: "apparel-men" }
          - { label: "Одежда женская", value: "apparel-women" }
          - { label: "Рюкзаки и сумки", value: "bags" }
          - { label: "Носки", value: "socks" }
          - { label: "Мелочи", value: "extras" }
      - { label: "Цена (₽)", name: "price", widget: "number", min: 0, step: 50 }
      - { label: "Старая цена (₽, для скидки)", name: "old_price", widget: "number", required: false, min: 0, step: 50 }
      - { label: "Описание", name: "description", widget: "text", required: false }
      - label: "Размеры"
        name: "sizes"
        widget: "list"
        required: false
        summary: "{{fields.size}}"
        field: { label: "Размер", name: "size", widget: "string" }
      - label: "Цвета"
        name: "colors"
        widget: "list"
        required: false
        summary: "{{fields.color}}"
        field: { label: "Цвет", name: "color", widget: "string" }
      - label: "Фото товара (можно перетаскивать для смены порядка)"
        name: "images"
        widget: "list"
        required: false
        allow_add: true
        summary: "Фото"
        field:
          { label: "Фото", name: "image", widget: "image" }
      - { label: "Скрыть товар (временно убрать из магазина, не удаляя)", name: "hidden", widget: "boolean", default: false, required: false }
      - { label: "Порядок в каталоге (меньше = выше). Оставь пустым для сортировки по алфавиту", name: "sort_index", widget: "number", required: false, hint: "Например, 1 = первый. Можно использовать 10, 20, 30 чтобы потом легко вставлять новые между ними" }

  # ============================
  # НАСТРОЙКИ САЙТА
  # ============================
  - name: "settings"
    label: "Настройки сайта"
    delete: false
    editor:
      preview: false
    files:
      # --- Название сайта / бренд ---
      - name: "brand"
        label: "Название сайта (логотип)"
        file: "content/settings/brand.json"
        fields:
          - { label: "Название бренда (отображается в шапке и футере)", name: "name", widget: "string", default: "BRAND" }

      # --- Категории на главной ---
      - name: "categories"
        label: "Категории на главной"
        file: "content/settings/categories.json"
        fields:
          - label: "Категории (порядок отображения = порядок здесь)"
            name: "items"
            widget: "list"
            summary: "{{fields.label}}"
            allow_add: false
            fields:
              - { label: "Системное имя (НЕ МЕНЯТЬ)", name: "id", widget: "string", hint: "gear / apparel / accessories / equipment" }
              - { label: "Название на сайте", name: "label", widget: "string" }
              - label: "Фото категории"
                name: "image"
                widget: "image"
                required: false
              - { label: "Скрыть категорию (страница станет недоступна)", name: "hidden", widget: "boolean", default: false }
              - { label: "Текст-заглушка вместо товаров (если категория скрыта)", name: "placeholder", widget: "string", required: false, default: "TO BE ANNOUNCED" }

      # --- Главная ---
      - name: "home"
        label: "Главная страница"
        file: "content/settings/home.json"
        fields:
          - { label: "Заголовок hero (строка 1)", name: "hero_title_1", widget: "string", default: "СДЕЛАЙ", required: false }
          - { label: "Заголовок hero (строка 2)", name: "hero_title_2", widget: "string", default: "ЭТО", required: false }
          - { label: "Размер шрифта hero (vw, по умолчанию 18)", name: "hero_title_size", widget: "number", required: false, default: 18, min: 6, max: 30, hint: "Чем меньше число — тем мельче текст. Для длинных русских слов уменьшай до 12-14" }
          - { label: "Подзаголовок hero", name: "hero_subtitle", widget: "string", required: false }
          - { label: "Текст на кнопке", name: "hero_cta", widget: "string", default: "В каталог" }
          - label: "Фоновое изображение hero (опционально)"
            name: "hero_image"
            widget: "image"
            required: false
            hint: "Большое изображение для главной страницы (заменяет тёмный градиент)"
          - { label: "Заголовок блока 'О нас'", name: "about_title", widget: "string" }
          - { label: "Текст блока 'О нас'", name: "about_text", widget: "text" }
          - { label: "Заголовок CTA (нижняя секция перед футером)", name: "cta_title", widget: "string", required: false, default: "Снаряжение, которое работает так же, как ты" }
          - { label: "Подзаголовок CTA", name: "cta_subtitle", widget: "string", required: false, default: "Собрали всё, что нужно для функционального тренинга" }
          - { label: "Текст кнопки CTA", name: "cta_button", widget: "string", required: false, default: "В каталог" }
          - label: "4 преимущества (блок «Преимущества» на главной)"
            name: "features"
            widget: "list"
            required: false
            max: 4
            min: 0
            summary: "{{fields.title}}"
            fields:
              - { label: "Иконка (один символ)", name: "icon", widget: "string", default: "◆" }
              - { label: "Заголовок", name: "title", widget: "string" }
              - { label: "Подпись", name: "text", widget: "string" }

      # --- Футер ---
      - name: "footer"
        label: "Футер (низ сайта)"
        file: "content/settings/footer.json"
        fields:
          - { label: "Подпись под лого в футере", name: "tagline", widget: "string", required: false, default: "Экипировка для функционального фитнеса" }
          - { label: "Копирайт (внизу слева)", name: "copyright", widget: "string", required: false, default: "© 2026 BRAND. Все права защищены." }
          - { label: "Текст справа внизу", name: "right_text", widget: "string", required: false, default: "Все товары сертифицированы." }

      # --- Бегущая строка ---
      - name: "marquee"
        label: "Бегущая строка (сверху)"
        file: "content/settings/marquee.json"
        fields:
          - label: "Фразы (повторяются)"
            name: "messages"
            widget: "list"
            summary: "{{fields.text}}"
            field: { label: "Фраза", name: "text", widget: "string" }

      # --- Контакты ---
      - name: "contacts"
        label: "Контакты и соцсети"
        file: "content/settings/contacts.json"
        fields:
          - { label: "Telegram канала / для контакта (ник без @)", name: "telegram", widget: "string", default: "xpodium_russia", hint: "Этот ник используется в шапке/футере для ссылки на канал" }
          - { label: "Telegram для приёма заказов (ник без @)", name: "order_telegram", widget: "string", default: "barkovdenis", hint: "Сюда будут уходить сообщения с заказами. Должен быть ЛИЧНЫЙ TG, не канал!" }
          - { label: "Instagram (ник без @)", name: "instagram", widget: "string", default: "xpodium_russia" }
          - { label: "Email (опц.)", name: "email", widget: "string", required: false }
          - { label: "Телефон (опц.)", name: "phone", widget: "string", required: false }

      # --- О нас ---
      - name: "story"
        label: "Страница 'О нас'"
        file: "content/settings/story.json"
        fields:
          - { label: "Заголовок (строка 1)", name: "title_1", widget: "string" }
          - { label: "Заголовок (строка 2)", name: "title_2", widget: "string" }
          - { label: "Подзаголовок", name: "subtitle", widget: "text" }
          - { label: "Основной текст", name: "body", widget: "markdown" }

      # --- Доставка и условия ---
      - name: "delivery"
        label: "Доставка, оплата, возврат"
        file: "content/settings/delivery.json"
        fields:
          - label: "Условия доставки"
            name: "delivery"
            widget: "list"
            field: { label: "Строка", name: "text", widget: "string" }
          - label: "Способы оплаты"
            name: "payment"
            widget: "list"
            field: { label: "Строка", name: "text", widget: "string" }
          - label: "Условия возврата"
            name: "returns"
            widget: "list"
            field: { label: "Строка", name: "text", widget: "string" }

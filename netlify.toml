[build]
  command = "node build-content.js"
  publish = "."

# Красивые URL: /shop вместо /shop.html
[[redirects]]
  from = "/shop"
  to = "/shop.html"
  status = 200

[[redirects]]
  from = "/our-story"
  to = "/our-story.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200
